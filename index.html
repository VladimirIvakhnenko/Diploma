<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Анимация алгоритмов</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5.0.0/index.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.0/index.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f0f2f5;
    --surface:   #ffffff;
    --border:    #d0d5df;
    --text:      #111827;
    --text-muted:#6b7280;
    --accent:    #2563eb;
    --accent2:   #7c3aed;
    --shadow:    0 1px 4px rgba(0,0,0,.10), 0 4px 16px rgba(0,0,0,.06);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }

  /* ── Controls ────────────────────────────────────────── */
  .controls {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: center;
    box-shadow: var(--shadow);
  }

  .divider { width: 1px; height: 28px; background: var(--border); }

  .control-group { display: flex; align-items: center; gap: 8px; }
  .control-group label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .6px;
    white-space: nowrap;
  }
  input[type="range"] {
    width: 110px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .value-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    min-width: 38px;
    font-weight: 600;
  }

  .radio-group { display: flex; gap: 6px; }
  .radio-pill {
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    transition: all .15s;
    user-select: none;
  }
  .radio-pill:has(input:checked) {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .radio-pill input { display: none; }

  /* Buttons */
  button {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 7px 14px;
    border: 1.5px solid transparent;
    border-radius: 7px;
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .2px;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 1px 3px rgba(37,99,235,.3);
  }
  .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border-color: var(--border);
  }
  .btn-secondary:hover:not(:disabled) { background: var(--bg); }
  button:disabled { opacity: .38; cursor: not-allowed; }

  /* ── Algorithm panels ────────────────────────────────── */
  .algorithms {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .algo-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    box-shadow: var(--shadow);
  }

  .algo-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .algo-title {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -.2px;
  }
  .algo-title.baseline { color: #b45309; }
  .algo-title.optimized { color: #047857; }

  .algo-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 4px;
    background: #f3f4f6;
    color: #374151;
    border: 1.5px solid #d1d5db;
  }

  canvas {
    width: 100%;
    height: 480px;
    background: #ffffff;
    border-radius: 8px;
    border: 2px solid #94a3b8;
    display: block;
  }

  /* ── Progress ────────────────────────────────────────── */
  .progress-bar {
    width: 100%;
    height: 3px;
    background: #e5e7eb;
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width .1s;
  }

  /* ── Stats ───────────────────────────────────────────── */
  .stats {
    margin-top: 10px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .stat {
    background: #f8fafc;
    border: 1px solid #e5e7eb;
    border-left: 3px solid var(--accent);
    padding: 7px 10px;
    border-radius: 6px;
  }
  .stat.result-stat { border-left-color: var(--danger); }
  .stat-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .7px;
    color: var(--text-muted);
  }
  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-top: 2px;
  }

  @media (max-width: 900px) {
    .algorithms { grid-template-columns: 1fr; }
    .controls { flex-direction: column; align-items: stretch; }
    .divider { display: none; }
  }
</style>
</head>
<body>


<div class="controls">
  <div class="control-group">
    <label>Размер N</label>
    <input type="range" id="nSlider" min="8" max="24" value="12" step="2">
    <span class="value-display" id="nValue">12</span>
  </div>

  <div class="divider"></div>

  <div class="control-group">
    <label>Структура</label>
    <div class="radio-group">
      <label class="radio-pill"><input type="radio" name="treeType" value="comb" checked>Гребёнка</label>
      <label class="radio-pill"><input type="radio" name="treeType" value="balanced">Сбалансированное</label>
    </div>
  </div>

  <div class="divider"></div>

  <div class="control-group">
    <label>Скорость</label>
    <input type="range" id="speedSlider" min="50" max="800" value="300" step="50">
    <span class="value-display" id="speedValue">300ms</span>
  </div>

  <div class="divider"></div>

  <button class="btn-primary" id="startBtn">Запустить</button>
  <button class="btn-secondary" id="resetBtn">Сбросить</button>
  <button class="btn-secondary" id="stepBtn">Шаг</button>


</div>

<div class="algorithms">
  <!-- Baseline -->
  <div class="algo-panel">
    <div class="algo-header">
      <div class="algo-title baseline">Базовый алгоритм</div>
      <div class="algo-badge">O(k · n)</div>
    </div>
    <canvas id="baselineCanvas"></canvas>
    <div class="progress-bar"><div class="progress-fill" id="baselineProgress" style="width:0%"></div></div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Итерация</div>
        <div class="stat-value" id="baselineIter">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Операций</div>
        <div class="stat-value" id="baselineOps">0</div>
      </div>
      <div class="stat result-stat">
        <div class="stat-label">Sum F^(d)_max</div>
        <div class="stat-value" id="baselineResult">—</div>
      </div>
    </div>
  </div>

  <!-- Optimized -->
  <div class="algo-panel">
    <div class="algo-header">
      <div class="algo-title optimized">Оптимизированный</div>
      <div class="algo-badge">O(n log n)</div>
    </div>
    <canvas id="optimizedCanvas"></canvas>
    <div class="progress-bar"><div class="progress-fill" id="optimizedProgress" style="width:0%"></div></div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Узел u</div>
        <div class="stat-value" id="optimizedNode">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Переносов</div>
        <div class="stat-value" id="optimizedMoves">0</div>
      </div>
      <div class="stat result-stat">
        <div class="stat-label">Sum M[1]</div>
        <div class="stat-value" id="optimizedResult">—</div>
      </div>
    </div>
  </div>
</div>


<script>
// =====================================================================
// CANVAS COLOUR TOKENS — light theme, high contrast
// =====================================================================
const C = {
  edgeDefault:    '#1e293b',   // near-black — maximum contrast on white
  edgeActive:     '#dc2626',   // red-600
  edgeVmax:       '#7c3aed',   // violet-700
  edgeWeight:     '#ffffff',   // white text on dark pill
  edgeWeightAct:  '#ffffff',
  nodeLeaf:       '#16a34a',   // green-600
  nodeInner:      '#1d4ed8',   // blue-700
  nodeActive:     '#ea580c',   // orange-600
  nodeProcessed:  '#7c3aed',   // violet-700
  nodeInfinity:   '#0284c7',   // sky-600
  nodeVmax:       '#7c3aed',
  nodeBorder:     '#ffffff',
  nodeLabelNum:   '#0f172a',
  nodeLabelVal:   '#b45309',   // amber-800
  nodeLabelVal2:  '#047857',   // emerald-700
  overlayBL:      '#92400e',
  overlayOpt:     '#065f46',
  canvasBg:       '#ffffff',
};

// =====================================================================
// 1. TREE GENERATORS
// =====================================================================
function generateCombTree(n) {
  if (n < 4) n = 4;
  const tree = {
    n,
    children: Array.from({length: n + 1}, () => []),
    cap: Array.from({length: n + 1}, () => []),
    incomingCap: new Array(n + 1).fill(0),
    depth: new Array(n + 1).fill(0),
    parent: new Array(n + 1).fill(0)
  };
  const addEdge = (u, v, c) => {
    tree.children[u].push(v); tree.cap[u].push(c);
    tree.incomingCap[v] = c; tree.parent[v] = u;
  };
  const spineLen = Math.floor(n / 2);
  for (let i = 1; i < spineLen; ++i) addEdge(i, i + 1, 10.0);
  for (let i = 1; i <= spineLen; ++i) {
    const leafId = spineLen + i;
    if (leafId <= n) addEdge(i, leafId, 100.0);
  }
  for (let i = 2 * spineLen + 1; i <= n; ++i) addEdge(1, i, 100.0);
  return tree;
}

function generateBalancedTree(n) {
  if (n < 4) n = 4;
  const tree = {
    n,
    children: Array.from({length: n + 1}, () => []),
    cap: Array.from({length: n + 1}, () => []),
    incomingCap: new Array(n + 1).fill(0),
    depth: new Array(n + 1).fill(0),
    parent: new Array(n + 1).fill(0)
  };
  const addEdge = (u, v, c) => {
    tree.children[u].push(v); tree.cap[u].push(c);
    tree.incomingCap[v] = c; tree.parent[v] = u;
  };
  let nextId = 2;
  const queue = [1];
  while (queue.length > 0 && nextId <= n) {
    const u = queue.shift();
    if (nextId <= n) { addEdge(u, nextId, 10.0); queue.push(nextId); nextId++; }
    if (nextId <= n) { addEdge(u, nextId, 10.0); queue.push(nextId); nextId++; }
  }
  return tree;
}

function calculateDepths(tree) {
  const q = [1]; tree.depth[1] = 0;
  while (q.length) {
    const u = q.shift();
    for (const v of tree.children[u]) { tree.depth[v] = tree.depth[u] + 1; q.push(v); }
  }
}

function getBottomUpOrder(tree) {
  const order = []; const q = [1];
  while (q.length) { const u = q.shift(); order.push(u); for (const v of tree.children[u]) q.push(v); }
  return order.reverse();
}

// =====================================================================
// 2. ANIMATOR
// =====================================================================
class AlgorithmAnimator {
  constructor(canvas, type) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.type = type;
    this.tree = null;
    this.positions = null;
    this.steps = [];
    this.currentStep = 0;
    this.state = null;
    this.depthStartCount = 0;
    this.totalSteps = 0;
  }

  resize() {
    const rect = this.canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    this.canvas.width = rect.width * dpr;
    this.canvas.height = rect.height * dpr;
    this.ctx.setTransform(1, 0, 0, 1, 0, 0);
    this.ctx.scale(dpr, dpr);
    this.canvasW = rect.width;
    this.canvasH = rect.height;
  }

  init(tree) {
    this.tree = JSON.parse(JSON.stringify(tree));
    calculateDepths(this.tree);
    this.resize();
    this.positions = this.computeLayout();
    this.buildSteps();
    this.currentStep = 0;
    this.totalSteps = this.steps.length;
    this.state = {
      activeNode: null,
      processedNodes: new Set(),
      activeEdges: [],
      dp: new Array(this.tree.n + 1).fill(0),
      M: Array.from({length: this.tree.n + 1}, () => new Map()),
      currentDepth: null,
      iterCount: 0,
      opsCount: 0,
      moveCount: 0,
      totalSum: 0,
      currentFmax: null,
      finalSum: null,
      infinityLeaves: new Set(),
      vmaxNode: null,
      vmaxInfo: null
    };
  }

  computeLayout() {
    const tree = this.tree;
    const positions = new Array(tree.n + 1).fill(null);
    const subtreeLeaves = new Array(tree.n + 1).fill(0);
    const countLeaves = (u) => {
      if (tree.children[u].length === 0) { subtreeLeaves[u] = 1; return 1; }
      let s = 0;
      for (const v of tree.children[u]) s += countLeaves(v);
      subtreeLeaves[u] = s; return s;
    };
    countLeaves(1);
    let maxDepth = 0;
    for (let u = 1; u <= tree.n; ++u) if (tree.depth[u] > maxDepth) maxDepth = tree.depth[u];
    const W = this.canvasW, H = this.canvasH, padX = 48, padYT = 50, padYB = 36;
    const assign = (u, left, right, depth) => {
      const y = padYT + (maxDepth > 0 ? (depth / maxDepth) * (H - padYT - padYB) : 0);
      const x = (left + right) / 2;
      positions[u] = {x, y};
      if (tree.children[u].length === 0) return;
      const total = subtreeLeaves[u];
      let curLeft = left;
      for (const v of tree.children[u]) {
        const w = (subtreeLeaves[v] / total) * (right - left);
        assign(v, curLeft, curLeft + w, depth + 1);
        curLeft += w;
      }
    };
    assign(1, padX, W - padX, 0);
    return positions;
  }

  buildSteps() {
    this.steps = [];
    if (this.type === 'baseline') this.buildBaselineSteps();
    else this.buildOptimizedSteps();
  }

  buildBaselineSteps() {
    const tree = this.tree;
    const order = getBottomUpOrder(tree);
    const depthSet = new Set();
    for (let u = 1; u <= tree.n; ++u) if (tree.children[u].length === 0) depthSet.add(tree.depth[u]);
    const depths = [...depthSet].sort((a, b) => a - b);
    this.depthStartCount = depths.length;
    this.steps.push({type: 'init'});
    for (let iterIdx = 0; iterIdx < depths.length; ++iterIdx) {
      const d = depths[iterIdx];
      this.steps.push({type: 'depth-start', depth: d, iterNum: iterIdx + 1});
      for (const u of order) {
        if (tree.children[u].length === 0) {
          const val = (tree.depth[u] === d) ? Infinity : 0;
          this.steps.push({type: 'process-leaf', node: u, value: val, isInfinity: tree.depth[u] === d});
        } else {
          this.steps.push({type: 'process-node', node: u});
        }
      }
      this.steps.push({type: 'depth-end'});
    }
    this.steps.push({type: 'done'});
  }

  buildOptimizedSteps() {
    const tree = this.tree;
    const order = getBottomUpOrder(tree);
    this.steps.push({type: 'init'});
    this.depthStartCount = 1;
    for (const u of order) {
      if (tree.children[u].length === 0) {
        this.steps.push({type: 'process-leaf', node: u, depth: tree.depth[u]});
      } else {
        this.steps.push({type: 'find-largest', node: u});
        for (let i = 0; i < tree.children[u].length; ++i) {
          const v = tree.children[u][i];
          this.steps.push({type: 'merge-child', node: u, child: v, edgeIdx: i});
        }
        this.steps.push({type: 'process-node', node: u});
      }
    }
    this.steps.push({type: 'done'});
  }

  executeStep() {
    if (this.currentStep >= this.steps.length) return null;
    const step = this.steps[this.currentStep];
    this.currentStep++;
    const s = this.state;
    s.activeEdges = [];
    switch (step.type) {
      case 'init': s.activeNode = null; break;
      case 'depth-start':
        s.currentDepth = step.depth;
        s.iterCount = step.iterNum;
        s.activeNode = null;
        s.processedNodes.clear();
        s.dp.fill(0);
        s.infinityLeaves.clear();
        s.currentFmax = null;
        break;
      case 'depth-end':
        s.activeNode = null;
        s.currentFmax = s.dp[1];
        s.totalSum += s.dp[1];
        break;
      case 'process-leaf':
        s.activeNode = step.node;
        s.processedNodes.add(step.node);
        if (this.type === 'baseline') {
          s.dp[step.node] = step.value;
          if (step.isInfinity) s.infinityLeaves.add(step.node);
        } else {
          const m = new Map(); m.set(step.depth, Infinity); s.M[step.node] = m;
        }
        s.opsCount++;
        break;
      case 'process-node':
        s.activeNode = step.node;
        s.processedNodes.add(step.node);
        if (this.type === 'baseline') {
          let total = 0;
          for (let i = 0; i < this.tree.children[step.node].length; ++i) {
            const v = this.tree.children[step.node][i];
            total += Math.min(this.tree.cap[step.node][i], s.dp[v]);
          }
          s.dp[step.node] = total;
        } else {
          const moves = this.performMerge(step.node);
          s.moveCount += moves;
        }
        s.opsCount++;
        break;
      case 'find-largest':
        s.activeNode = step.node;
        const vmax = this.findVMax(step.node);
        s.vmaxNode = vmax;
        s.vmaxInfo = {node: vmax, size: s.M[vmax] ? s.M[vmax].size : 0};
        break;
      case 'merge-child':
        s.activeNode = step.node;
        s.activeEdges.push([step.node, step.child]);
        s.opsCount++;
        break;
      case 'done':
        s.activeNode = null;
        if (this.type === 'optimized') {
          let sum = 0;
          if (s.M[1]) for (const v of s.M[1].values()) sum += v;
          s.finalSum = sum;
        }
        break;
    }
    return step;
  }

  findVMax(u) {
    const tree = this.tree, s = this.state;
    let bestI = 0, bestSize = 0;
    for (let i = 0; i < tree.children[u].length; ++i) {
      const v = tree.children[u][i];
      const size = s.M[v] ? s.M[v].size : 0;
      if (size > bestSize) { bestSize = size; bestI = i; }
    }
    return tree.children[u][bestI];
  }

  performMerge(u) {
    const tree = this.tree, s = this.state;
    if (tree.children[u].length === 0) return 0;
    let bestI = 0, bestSize = 0;
    for (let i = 0; i < tree.children[u].length; ++i) {
      const v = tree.children[u][i];
      const size = s.M[v] ? s.M[v].size : 0;
      if (size > bestSize) { bestSize = size; bestI = i; }
    }
    const vmax = tree.children[u][bestI], cvmax = tree.cap[u][bestI];
    const newM = new Map();
    if (s.M[vmax]) for (const [d, val] of s.M[vmax]) newM.set(d, Math.min(cvmax, val));
    let moves = 0;
    for (let i = 0; i < tree.children[u].length; ++i) {
      if (i === bestI) continue;
      const v = tree.children[u][i], cv = tree.cap[u][i];
      if (!s.M[v]) continue;
      for (const [d, val] of s.M[v]) {
        const term = Math.min(cv, val);
        newM.set(d, (newM.get(d) || 0) + term);
        moves++;
      }
      s.M[v] = new Map();
    }
    s.M[u] = newM;
    s.M[vmax] = new Map();
    return moves;
  }

  draw() {
    const ctx = this.ctx, W = this.canvasW, H = this.canvasH;
    ctx.clearRect(0, 0, W, H);
    if (!this.tree || !this.positions) return;

    // Pure white canvas — maximum contrast
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);

    const tree = this.tree, s = this.state;

    // ── Edges first (drawn under nodes) ───────────────────
    for (let u = 1; u <= tree.n; ++u) {
      for (let i = 0; i < tree.children[u].length; ++i) {
        const v = tree.children[u][i];
        const p1 = this.positions[u], p2 = this.positions[v];
        if (!p1 || !p2) continue;

        const isActive   = s.activeEdges.some(([a, b]) => a === u && b === v);
        const isVmaxEdge = s.vmaxNode === v && s.activeNode === u;

        ctx.setLineDash([]);

        // Glow pass for highlighted edges (drawn first, blurred)
        if (isActive || isVmaxEdge) {
          ctx.save();
          ctx.shadowColor = isActive ? '#dc2626' : '#7c3aed';
          ctx.shadowBlur = 16;
          ctx.beginPath();
          ctx.moveTo(p1.x, p1.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.strokeStyle = isActive ? '#dc2626' : '#7c3aed';
          ctx.lineWidth = isActive ? 7 : 6;
          ctx.stroke();
          ctx.restore();
        }

        // Main edge stroke
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);

        if (isActive) {
          ctx.strokeStyle = '#dc2626';
          ctx.lineWidth = 6;
          ctx.setLineDash([]);
        } else if (isVmaxEdge) {
          ctx.strokeStyle = '#7c3aed';
          ctx.lineWidth = 5;
          ctx.setLineDash([10, 6]);
        } else {
          ctx.strokeStyle = '#1e293b';   // near-black — maximum contrast
          ctx.lineWidth = 3;
          ctx.setLineDash([]);
        }
        ctx.stroke();
        ctx.setLineDash([]);

        // ── Edge weight label ─────────────────────────────
        const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
        const dx = p2.x - p1.x, dy = p2.y - p1.y;
        const len = Math.sqrt(dx * dx + dy * dy);
        let nx = -dy / len, ny = dx / len;
        if (ny > 0) { nx = -nx; ny = -ny; }
        const off = 18;
        const lx = mx + nx * off, ly = my + ny * off;

        ctx.font = 'bold 13px JetBrains Mono';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const wLabel = tree.cap[u][i].toString();
        const tw = ctx.measureText(wLabel).width;
        const pr = 6, ph = 11;  // pill padding

        // Pill fill: coloured for active/vmax, dark for default
        const pillFill   = isActive ? '#dc2626' : isVmaxEdge ? '#7c3aed' : '#1e293b';
        const pillStroke = isActive ? '#7f1d1d' : isVmaxEdge ? '#4c1d95' : '#0f172a';

        ctx.fillStyle = pillFill;
        ctx.beginPath();
        ctx.roundRect(lx - tw/2 - pr, ly - ph, tw + pr * 2, ph * 2, ph);
        ctx.fill();
        ctx.strokeStyle = pillStroke;
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.fillStyle = '#ffffff';   // always white text on dark pill
        ctx.fillText(wLabel, lx, ly);
      }
    }

    // ── Nodes ──────────────────────────────────────────────
    for (let u = 1; u <= tree.n; ++u) {
      const p = this.positions[u];
      if (!p) continue;
      const isLeaf      = tree.children[u].length === 0;
      const isActive    = s.activeNode === u;
      const isProcessed = s.processedNodes.has(u);
      const isInfinity  = s.infinityLeaves.has(u);
      const isVMax      = s.vmaxNode === u;

      // Presentation-scale radii
      let radius = isLeaf ? 14 : 18;
      if (isActive) radius += 5;
      else if (isVMax) radius += 3;

      let fillColor, ringColor;
      if (isActive) {
        fillColor = '#ea580c';   // orange
        ringColor = '#7c2d12';
      } else if (isInfinity) {
        fillColor = '#0284c7';   // sky
        ringColor = '#0c4a6e';
      } else if (isVMax) {
        fillColor = '#7c3aed';   // violet
        ringColor = '#4c1d95';
      } else if (isProcessed) {
        fillColor = '#7c3aed';
        ringColor = '#4c1d95';
      } else if (isLeaf) {
        fillColor = '#16a34a';   // green
        ringColor = '#14532d';
      } else {
        fillColor = '#1d4ed8';   // blue
        ringColor = '#1e3a8a';
      }

      // Glow for active / vmax
      if (isActive || isVMax) {
        ctx.save();
        ctx.shadowColor = fillColor;
        ctx.shadowBlur = 22;
        ctx.beginPath();
        ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = fillColor;
        ctx.fill();
        ctx.restore();
      }

      // Node fill
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx.fillStyle = fillColor;
      ctx.fill();

      // White border + dark ring
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius + 3, 0, Math.PI * 2);
      ctx.strokeStyle = ringColor;
      ctx.lineWidth = 2;
      ctx.stroke();

      // ── Node ID label (inside circle) ─────────────────
      ctx.font = `bold ${radius > 17 ? 15 : 13}px JetBrains Mono`;
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(u.toString(), p.x, p.y);

      // ── Value label (below node) ───────────────────────
      let label = '';
      if (this.type === 'baseline') {
        if (isProcessed || s.dp[u] !== 0) {
          label = s.dp[u] === Infinity ? 'inf' : s.dp[u] !== 0 ? s.dp[u].toFixed(0) : '';
        }
      } else {
        if (s.M[u] && s.M[u].size > 0) {
          const entries = [...s.M[u].entries()];
          label = entries.length <= 2
            ? entries.map(([d, v]) => `${d}:${v === Infinity ? 'inf' : v.toFixed(0)}`).join(' ')
            : `|M|=${s.M[u].size}`;
        }
      }

      if (label) {
        const labelY = p.y + radius + 7;
        ctx.font = 'bold 12px JetBrains Mono';
        const lw = ctx.measureText(label).width;
        // Background chip
        ctx.fillStyle = this.type === 'baseline' ? '#fef3c7' : '#d1fae5';
        ctx.strokeStyle = this.type === 'baseline' ? '#d97706' : '#059669';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(p.x - lw/2 - 5, labelY - 1, lw + 10, 16, 4);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = this.type === 'baseline' ? '#92400e' : '#065f46';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(label, p.x, labelY);
      }
    }

    // ── Overlay info badge (top-left) ─────────────────────
    const pad = 12;
    if (this.type === 'baseline' && s.currentDepth !== null) {
      const text = `iter ${s.iterCount}/${this.depthStartCount}   d = ${s.currentDepth}`;
      ctx.font = 'bold 15px JetBrains Mono';
      const tw = ctx.measureText(text).width;
      ctx.fillStyle = '#fef3c7';
      ctx.strokeStyle = '#d97706';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(pad, pad, tw + 24, 32, 7);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#92400e';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, pad + 12, pad + 16);

    } else if (this.type === 'optimized' && s.activeNode !== null) {
      const info = s.vmaxNode ? `u = ${s.activeNode}   vmax = ${s.vmaxNode}` : `u = ${s.activeNode}`;
      ctx.font = 'bold 15px JetBrains Mono';
      const tw = ctx.measureText(info).width;
      ctx.fillStyle = '#d1fae5';
      ctx.strokeStyle = '#059669';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(pad, pad, tw + 24, 32, 7);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#065f46';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(info, pad + 12, pad + 16);
    }

    // Legend (bottom-right)
    this.drawLegend(W, H);
  }

  drawLegend(W, H) {
    const items = this.type === 'baseline'
      ? [
          {color: '#16a34a', label: 'Лист'},
          {color: '#1d4ed8', label: 'Внутренний'},
          {color: '#ea580c', label: 'Активный'},
          {color: '#0284c7', label: 'inf-лист'},
          {color: '#7c3aed', label: 'Обработан'},
        ]
      : [
          {color: '#16a34a', label: 'Лист'},
          {color: '#1d4ed8', label: 'Внутренний'},
          {color: '#ea580c', label: 'Активный'},
          {color: '#7c3aed', label: 'v_max'},
          {color: '#7c3aed', label: 'Обработан'},
        ];

    const cx = this.ctx;
    const itemH = 22, padX = 10, padY = 8, dotR = 7;
    const colW = 110;
    const totalH = items.length * itemH + padY * 2;
    const bx = W - colW - padX * 2 - 8;
    const by = H - totalH - 8;

    // Panel
    cx.fillStyle = 'rgba(255,255,255,0.95)';
    cx.strokeStyle = '#94a3b8';
    cx.lineWidth = 1.5;
    cx.beginPath();
    cx.roundRect(bx - padX, by - padY, colW + padX * 2, totalH, 8);
    cx.fill();
    cx.stroke();

    items.forEach((item, idx) => {
      const iy = by + idx * itemH + itemH / 2;

      // Dot
      cx.beginPath();
      cx.arc(bx + dotR, iy, dotR, 0, Math.PI * 2);
      cx.fillStyle = item.color;
      cx.fill();
      cx.strokeStyle = '#ffffff';
      cx.lineWidth = 2;
      cx.stroke();
      cx.beginPath();
      cx.arc(bx + dotR, iy, dotR + 1.5, 0, Math.PI * 2);
      cx.strokeStyle = item.color + 'aa';
      cx.lineWidth = 1;
      cx.stroke();

      // Label
      cx.font = 'bold 12px Inter';
      cx.fillStyle = '#1e293b';
      cx.textAlign = 'left';
      cx.textBaseline = 'middle';
      cx.fillText(item.label, bx + dotR * 2 + 8, iy);
    });
  }

  getProgress() { return this.currentStep / Math.max(1, this.totalSteps); }

  getStats() {
    const s = this.state;
    return {
      opsCount: s.opsCount,
      moveCount: s.moveCount,
      totalSum: s.totalSum,
      finalSum: s.finalSum,
      iterCount: s.iterCount,
      depthStartCount: this.depthStartCount,
      currentDepth: s.currentDepth
    };
  }
}

// =====================================================================
// 3. MAIN LOGIC
// =====================================================================
const baselineCanvas  = document.getElementById('baselineCanvas');
const optimizedCanvas = document.getElementById('optimizedCanvas');
const baselineAnim    = new AlgorithmAnimator(baselineCanvas, 'baseline');
const optimizedAnim   = new AlgorithmAnimator(optimizedCanvas, 'optimized');

const nSlider      = document.getElementById('nSlider');
const nValue       = document.getElementById('nValue');
const speedSlider  = document.getElementById('speedSlider');
const speedValue   = document.getElementById('speedValue');
const startBtn     = document.getElementById('startBtn');
const resetBtn     = document.getElementById('resetBtn');
const stepBtn      = document.getElementById('stepBtn');

let currentN = 12, currentTreeType = 'comb', speed = 300;
let running = false, animationTimer = null;

const fmtNum = x => {
  if (x === null || x === undefined) return '—';
  if (x === Infinity) return 'inf';
  if (!isFinite(x)) return '—';
  if (Number.isInteger(x)) return x.toString();
  return x.toFixed(1);
};

function generateTree(n, type) {
  return type === 'balanced' ? generateBalancedTree(n) : generateCombTree(n);
}

function initTree() {
  const tree = generateTree(currentN, currentTreeType);
  calculateDepths(tree);
  baselineAnim.init(tree);
  optimizedAnim.init(tree);
  baselineAnim.draw();
  optimizedAnim.draw();
  updateStats();
  updateProgress();
}

function updateStats() {
  const bs = baselineAnim.getStats();
  document.getElementById('baselineIter').textContent   = bs.iterCount > 0 ? `${bs.iterCount}/${bs.depthStartCount}` : '—';
  document.getElementById('baselineOps').textContent    = bs.opsCount;
  document.getElementById('baselineResult').textContent = fmtNum(bs.totalSum);

  const os = optimizedAnim.getStats();
  document.getElementById('optimizedNode').textContent  = optimizedAnim.state.activeNode !== null ? `u=${optimizedAnim.state.activeNode}` : '—';
  document.getElementById('optimizedMoves').textContent = os.moveCount;
  if (os.finalSum !== null) {
    document.getElementById('optimizedResult').textContent = fmtNum(os.finalSum);
  } else if (optimizedAnim.state.M[1] && optimizedAnim.state.M[1].size > 0) {
    let sum = 0;
    for (const v of optimizedAnim.state.M[1].values()) sum += v;
    document.getElementById('optimizedResult').textContent = fmtNum(sum);
  } else {
    document.getElementById('optimizedResult').textContent = '—';
  }
}

function updateProgress() {
  document.getElementById('baselineProgress').style.width  = (baselineAnim.getProgress() * 100)  + '%';
  document.getElementById('optimizedProgress').style.width = (optimizedAnim.getProgress() * 100) + '%';
}

// ── Animation loop ──────────────────────────────────────────────────
function animationTick() {
  baselineAnim.executeStep();
  optimizedAnim.executeStep();
  baselineAnim.draw();
  optimizedAnim.draw();
  updateStats();
  updateProgress();

  const done = baselineAnim.currentStep  >= baselineAnim.steps.length &&
               optimizedAnim.currentStep >= optimizedAnim.steps.length;

  if (done) {
    if (running) {
      running = false;
      startBtn.disabled = false;
      startBtn.textContent = 'Запустить';
    }
    return;
  }
  if (running) animationTimer = setTimeout(animationTick, speed);
}


function start() {
  if (running) return;
  running = true;
  startBtn.disabled = true;
  startBtn.textContent = 'Выполняется...';
  animationTimer = setTimeout(animationTick, 10);
}

function stop() {
  running = false;
  if (animationTimer) { clearTimeout(animationTimer); animationTimer = null; }
  startBtn.disabled = false;
  startBtn.textContent = 'Запустить';
}

function reset() {
  stop();
  initTree();
  updateProgress();
}


// ── Event handlers ──────────────────────────────────────────────────
nSlider.addEventListener('input', e => { currentN = parseInt(e.target.value); nValue.textContent = currentN; });
nSlider.addEventListener('change', () => { if (!running) reset(); });

speedSlider.addEventListener('input', e => { speed = parseInt(e.target.value); speedValue.textContent = speed + 'ms'; });

document.querySelectorAll('input[name="treeType"]').forEach(el => {
  el.addEventListener('change', e => { currentTreeType = e.target.value; if (!running) reset(); });
});

startBtn.addEventListener('click', () => { if (running) stop(); else start(); });
resetBtn.addEventListener('click', reset);
stepBtn.addEventListener('click', () => {
  if (!running) {
    baselineAnim.executeStep(); optimizedAnim.executeStep();
    baselineAnim.draw(); optimizedAnim.draw();
    updateStats(); updateProgress();
  }
});

window.addEventListener('resize', () => {
  [baselineAnim, optimizedAnim].forEach(a => {
    a.resize();
    a.positions = a.computeLayout();
    a.draw();
  });
});

initTree();
</script>
